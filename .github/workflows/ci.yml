name: CI

on:
  pull_request:
  push:
    branches: [ main ]
    paths: [ 'scripts/**', 'tests/**' ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run unit tests (stdlib only — no pip install needed)
        run: python -m unittest discover tests -v
